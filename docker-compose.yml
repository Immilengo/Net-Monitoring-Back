services:
  # Dev flow:
  # 1) docker compose up -d  -> sobe apenas o Postgres na porta 65432
  # 2) npm run prisma:migrate (se necessário)
  # 3) npm run dev          -> backend em http://localhost:12000
  # 4) npm run dev          -> frontend em http://localhost:3001
  #
  # O serviço da API fica deliberadamente comentado para não conflitar com
  # o backend rodando via npm run dev.
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   env_file:
  #     - .env
  #   environment:
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_NAME: ${DB_NAME:-monitoring_db}
  #     DB_USER: ${DB_USER:-postgres}
  #     DB_PASSWORD: ${DB_PASSWORD:-postgres}
  #     DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-monitoring_db}?schema=public
  #   ports:
  #     - '${APP_PORT:-12000}:${APP_PORT:-12000}'
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-monitoring_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '${DB_PORT:-65432}:5432'
    env_file:
      - .env
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-monitoring_db}']
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
