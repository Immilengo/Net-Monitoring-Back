  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-express_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '${DB_PORT:-15432}:5432'
    env_file:
      - .env
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-express_db}']
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

